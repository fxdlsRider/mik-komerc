<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO Meta Tags -->
    <title>About Us - mik-komerc | Family Business Since 1990</title>
    <meta name="description" content="Learn about mik-komerc's 30+ year history as an ISO-certified family-owned manufacturer of professional cleaning products in Serbia.">
    <meta name="keywords" content="about mik-komerc, family business, ISO certified manufacturer, Serbia cleaning products, company history">

    <!-- Open Graph (Social Media) -->
    <meta property="og:title" content="About Us - mik-komerc | Family Business Since 1990">
    <meta property="og:description" content="30+ years of ISO-certified manufacturing excellence in Serbia.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mik-komerc.com/about">
    <meta property="og:image" content="https://mik-komerc.vercel.app/assets/images/og-image.jpg">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon/favicon.svg">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/icons/favicon/favicon-96x96.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/favicon/apple-touch-icon.png">
    <link rel="manifest" href="assets/icons/favicon/site.webmanifest">

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/cta.css">
</head>

<body>
    <nav class="navigationWrapper">
        <p class="logo">mik-komerc</p>
        <div>
            <ul class="navigation">
                <li><a href="index.html" class="nav-link" data-i18n="nav.home"></a></li>
                <li><a href="products.html" class="nav-link" data-i18n="nav.products"></a></li>
                <li><a href="about.html" class="nav-link active" data-i18n="nav.about"></a></li>
                <li><a href="contact.html" class="nav-link" data-i18n="nav.contact"></a></li>
            </ul>
        </div>
        <div>
            <ul class="navigation">
                <li><a class="lang-switch" data-lang="sr">🇷🇸</a></li>
                <li><a class="lang-switch" data-lang="de">🇩🇪</a></li>
                <li><a class="lang-switch" data-lang="en">🇬🇧</a></li>
                <li><img src="assets/icons/heart.svg" alt=""></li>
            </ul>
        </div>
        <button class="burger-menu-btn" aria-label="Open navigation menu">
            <img src="assets/icons/menu.svg" alt="">
        </button>
    </nav>
    <div class="burger-overlay"></div>
    <div class="burger-nav">
        <button class="burger-close-btn" aria-label="Close navigation menu">
            <img src="assets/icons/x.svg" alt="">
        </button>
        <ul>
            <li><a href="index.html" class="nav-link" data-i18n="nav.home"></a></li>
            <li><a href="products.html" class="nav-link" data-i18n="nav.products"></a></li>
            <li><a href="about.html" class="nav-link active" data-i18n="nav.about"></a></li>
            <li><a href="contact.html" class="nav-link" data-i18n="nav.contact"></a></li>
            <li class="burger-lang-switcher">
                <a class="lang-switch" data-lang="sr">🇷🇸</a>
                <a class="lang-switch" data-lang="de">🇩🇪</a>
                <a class="lang-switch" data-lang="en">🇬🇧</a>
            </li>
        </ul>
    </div>

    <main>
        <!-- Hero -->
        <section class="page-hero">
            <h1 data-i18n="about.hero_title"></h1>
            <p data-i18n="about.hero_subtitle"></p>
        </section>

        <!-- Our Story -->
        <section class="story">
            <div>
                <h2 data-i18n="about.story_heading"></h2>
                <p data-i18n="about.story_text_1"></p>
                <p data-i18n="about.story_text_2"></p>
                <p data-i18n="about.story_text_3"></p>
            </div>
            <div class="story-card">
                <div class="story-item">
                    <div class="story-icon">
                        <img src="assets/icons/factory.svg" alt="">
                    </div>
                    <div class="story-text">
                        <h3 data-i18n="about.story_item_1_title"></h3>
                        <p data-i18n="about.story_item_1_text"></p>
                    </div>
                </div>

                <div class="story-item">
                    <div class="story-icon">
                        <img src="assets/icons/users.svg" alt="">
                    </div>
                    <div class="story-text">
                        <h3 data-i18n="about.story_item_2_title"></h3>
                        <p data-i18n="about.story_item_2_text"></p>
                    </div>
                </div>

                <div class="story-item">
                    <div class="story-icon">
                        <img src="assets/icons/globe.svg" alt="">
                    </div>
                    <div class="story-text">
                        <h3 data-i18n="about.story_item_3_title"></h3>
                        <p data-i18n="about.story_item_3_text"></p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Our Values -->
        <section class="values-wrapper">
            <div class="values-hero">
                <h2 data-i18n="about.values_heading"></h2>
                <p data-i18n="about.values_subtitle"></p>
            </div>
            <div class="values">
                <div class="values-card">
                    <div class="values-icon">
                        <img src="assets/icons/award.svg" alt="">
                    </div>
                    <h3 data-i18n="about.value_1_title"></h3>
                    <p data-i18n="about.value_1_text"></p>
                </div>

                <div class="values-card">
                    <div class="values-icon">
                        <img src="assets/icons/heart-handshake.svg" alt="">
                    </div>
                    <h3 data-i18n="about.value_2_title"></h3>
                    <p data-i18n="about.value_2_text"></p>
                </div>

                <div class="values-card">
                    <div class="values-icon">
                        <img src="assets/icons/leaf.svg" alt="">
                    </div>
                    <h3 data-i18n="about.value_3_title"></h3>
                    <p data-i18n="about.value_3_text"></p>
                </div>
            </div>
        </section>

        <!-- Certifications -->
        <section class="certifications">
            <div>
                <h2 data-i18n="about.cert_heading"></h2>
                <p data-i18n="about.cert_subtitle"></p>

                <div class="cert-item">
                    <div class="cert-check">
                        <img src="assets/icons/check-circle.svg" alt="">
                    </div>
                    <div>
                        <h4 data-i18n="about.cert_iso9001_title"></h4>
                        <p data-i18n="about.cert_iso9001_text"></p>
                    </div>
                </div>

                <div class="cert-item">
                    <div class="cert-check">
                        <img src="assets/icons/check-circle.svg" alt="">
                    </div>
                    <div>
                        <h4 data-i18n="about.cert_iso14001_title"></h4>
                        <p data-i18n="about.cert_iso14001_text"></p>
                    </div>
                </div>
            </div>

            <div class="certifications-card-wrapper">
                <div class="certifications-card">
                    <h2>ISO</h2>
                    <h5>9001:2015</h5>
                    <p data-i18n="about.cert_card_iso9001_label"></p>
                </div>
                <div class="certifications-card">
                    <h2>ISO</h2>
                    <h5>14001:2015</h5>
                    <p data-i18n="about.cert_card_iso14001_label"></p>
                </div>
                <p class="cert-note" data-i18n="about.cert_note"></p>
            </div>
        </section>

        <!-- Our Mission -->
        <section class="mission-wrapper">
            <div class="mission-hero">
                <h2 data-i18n="about.mission_heading"></h2>
                <p data-i18n="about.mission_text"></p>

                <div class="mission-tagline">
                    <div class="mission-tagline-icon">
                        <img src="assets/icons/heart.svg" alt="">
                    </div>
                    <span class="mission-tagline-text" data-i18n="about.mission_tagline"></span>
                </div>
            </div>
        </section>

        <!-- CTA -->
        <section class="cta">
            <div class="cta-content">
                <h2 data-i18n="about.cta_title"></h2>
                <p data-i18n="about.cta_text"></p>

                <div class="cta-buttons">
                    <a href="products.html" class="btn-primary" data-i18n="about.cta_btn_products"></a>
                    <a href="contact.html" class="btn-secondary" data-i18n="about.cta_btn_contact"></a>
                </div>
            </div>
        </section>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3 class="footer-logo" data-i18n="footer.logo"></h3>
                <p class="footer-tagline" data-i18n="footer.tagline"></p>
                <p class="footer-description" data-i18n="footer.description"></p>

                <div class="footer-badges">
                    <div class="footer-badge" data-i18n="footer.badge_iso9001"></div>
                    <div class="footer-badge" data-i18n="footer.badge_iso14001"></div>
                    <div class="footer-badge footer-badge-red" data-i18n="footer.badge_est"></div>
                </div>
            </div>

            <div class="footer-section">
                <h4 data-i18n="footer.quick_links"></h4>
                <ul class="footer-links">
                    <li><a href="index.html" class="nav-link" data-i18n="nav.home"></a></li>
                    <li><a href="products.html" class="nav-link" data-i18n="nav.products"></a></li>
                    <li><a href="about.html" class="nav-link" data-i18n="nav.about"></a></li>
                    <li><a href="contact.html" class="nav-link" data-i18n="nav.contact"></a></li>
                </ul>
            </div>

            <div class="footer-section">
                <h4 data-i18n="footer.contact_heading"></h4>
                <p data-i18n="footer.address"></p>
                <p data-i18n="footer.phone1"></p>
                <p data-i18n="footer.phone2"></p>
                <p data-i18n="footer.email1"></p>
                <p data-i18n="footer.email2"></p>
            </div>
        </div>

        <div class="footer-bottom">
            <p data-i18n="footer.copyright"></p>
        </div>
    </footer>
    <script src="js/burger-menu.js"></script>
    <script type="module" src="js/language-switcher.js"></script>

</html>
